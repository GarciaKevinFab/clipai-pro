services:
  - type: web
    name: clipai-pro-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: "cd backend && chmod +x build.sh && ./build.sh"
    startCommand: "cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://clipai-pro.netlify.app"
      - key: DATABASE_URL
        value: "sqlite:///db.sqlite3"
      - key: FRONTEND_URL
        value: "https://clipai-pro.netlify.app"
      - key: BASE_URL
        value: "https://clipai-pro-backend.onrender.com"
